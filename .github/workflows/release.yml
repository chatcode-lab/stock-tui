name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "stock-tui") | .version')"
          test "v${package_version}" = "${GITHUB_REF_NAME}"
      - run: cargo test --locked --all-targets

  build:
    needs: verify
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: stock-tui-linux-x86_64
            binary: stock-tui
            target: x86_64-unknown-linux-musl
          - os: macos-latest
            artifact: stock-tui-macos-aarch64
            binary: stock-tui
            target: aarch64-apple-darwin
          - os: windows-latest
            artifact: stock-tui-windows-x86_64
            binary: stock-tui.exe
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Stage Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          cp README.md LICENSE CHANGELOG.md dist/
          tar -C dist -czf "${{ matrix.artifact }}.tar.gz" .
      - name: Stage Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" dist/
          Copy-Item README.md,LICENSE,CHANGELOG.md dist/
          Compress-Archive -Path dist/* -DestinationPath "${{ matrix.artifact }}.zip"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: artifacts/*
